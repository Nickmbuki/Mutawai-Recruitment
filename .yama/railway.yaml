project: mutawai-recruitment-platform
provider: railway
services:
  postgres:
    type: plugin
    plugin: postgresql
  backend:
    root: backend
    build: pnpm --filter backend run build
    start: pnpm --filter backend run start
    env:
      DATABASE_URL: ${{ railway.postgres.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      PORT: ${{ railway.PORT }}
  frontend:
    root: frontend
    build: pnpm --filter frontend run build
    start: pnpm --filter frontend run preview -- --host 0.0.0.0 --port $PORT
    env:
      VITE_API_URL: ${{ services.backend.url }}/api
